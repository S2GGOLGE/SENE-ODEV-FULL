<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Pro | Şifre Güncelleme</title>
    <link rel="stylesheet" href="/css/passupdate.css">
</head>

<body>

    <div class="menu">
        <a href="/pages/giriş.html">← Geri Dön</a>
    </div>

    <div class="container">
        <!-- FORM EKLENDİ -->
        <form id="passForm" class="form">

            <input type="text" id="username" placeholder="Kullanıcı Adı">
            <input type="tel" id="phone" placeholder="Telefon">
            <input type="email" id="email" placeholder="Email">

            <input type="password" id="pass" placeholder="Şifre Giriniz..." required>
            <input type="password" id="passRepeat" placeholder="Şifre Tekrar Giriniz..." required>

            <button type="submit" id="passUpdateBtn" class="Update-btn">
                Şifre Yenile
            </button>

        </form>
    </div>

    <script src="/js/passUpdate.js"></script>
</body>

</html>
