<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Pro | Şifre Güncelleme</title>
    <link rel="stylesheet" href="/css/passupdate.css">
    <link rel="icon" href="/css/Images/logo.png">
</head>

<body>
    <div class="container">
        <!-- FORM EKLENDİ -->
        <form id="passForm" class="form">
            <input type="text" id="username" placeholder="Username Giriniz..." required>
            <input type="password" id="newPass" placeholder="Şifre Giriniz..." required>
            <input type="password" id="newPassRepeat" placeholder="Şifre Tekrar Giriniz..." required>

            <button type="submit" id="passUpdateBtn" class="Update-btn">
                Şifre Yenile
            </button>
        </form>

        <!-- Sonuç göstermek için div -->
        <div id="result" class="result"></div>
    </div>
    <script src="/js/passUpdate.js"></script>
</body>

</html>
